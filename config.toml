# Site configuration — Tranquilpeak theme
# Docs: https://github.com/kakawait/hugo-tranquilpeak-theme/blob/master/docs/user.md

baseURL = "https://yueyvettehao.github.io/"
languageCode = "en-us"
defaultContentLanguage = "en-us"
title = "Yue Hao"
theme = "hugo-tranquilpeak-theme"
paginate = 7
canonifyurls = true

[services.googleAnalytics]
  ID = "G-JBMFYHYMTW"

[privacy.googleAnalytics]
  anonymizeIP = true
  respectDoNotTrack = true

[permalinks]
  posts = "/:year/:month/:slug/"

[taxonomies]
  tag = "tags"
  category = "categories"
  archive = "archives"

[markup]
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 1

[author]
  name = "Yue Hao"
  bio = "Data scientist with a research background in computational biology. I turn messy data into clear stories."
  job = "Data Scientist"
  location = ""
  # Gravatar (overrides `picture` if set). Uncomment to use:
  # gravatarEmail = "haoyuethink@gmail.com"
  # Or use a local/remote profile picture:
  picture = "images/avatar.png"

