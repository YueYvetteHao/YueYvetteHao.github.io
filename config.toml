# Site configuration — Tranquilpeak theme
# Docs: https://github.com/kakawait/hugo-tranquilpeak-theme/blob/master/docs/user.md

baseURL = "https://yueyvettehao.github.io/"
languageCode = "en-us"
defaultContentLanguage = "en-us"
title = "Yue Hao"
theme = "hugo-tranquilpeak-theme"
paginate = 7
canonifyurls = true

[permalinks]
  posts = "/:year/:month/:slug/"

[taxonomies]
  tag = "tags"
  category = "categories"
  archive = "archives"

[markup]
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 1

[author]
  name = "Yue Hao"
  bio = "Welcome to my portfolio!"
  job = "Data Scientist"
  location = ""
  # Gravatar (overrides `picture` if set). Uncomment to use:
  # gravatarEmail = "haoyuethink@gmail.com"
  # Or use a local/remote profile picture:
  picture = "images/avatar.png"

# ------------
# Sidebar menu
# ------------
[[menu.main]]
  weight = 1
  identifier = "home"
  name = "Home"
  pre = "<i class=\"sidebar-button-icon fas fa-lg fa-home\" aria-hidden=\"true\"></i>"
  url = "/"
[[menu.main]]
  weight = 2
  identifier = "blog"
  name = "Blog"
  pre = "<i class=\"sidebar-button-icon fas fa-lg fa-pen\" aria-hidden=\"true\"></i>"
  url = "/posts"
[[menu.main]]
  weight = 3
  identifier = "categories"
  name = "Categories"
  pre = "<i class=\"sidebar-button-icon fas fa-lg fa-bookmark\" aria-hidden=\"true\"></i>"
  url = "/categories"
[[menu.main]]
  weight = 4
  identifier = "tags"
  name = "Tags"
  pre = "<i class=\"sidebar-button-icon fas fa-lg fa-tags\" aria-hidden=\"true\"></i>"
  url = "/tags"
[[menu.main]]
  weight = 5
  identifier = "archives"
  name = "Archives"
  pre = "<i class=\"sidebar-button-icon fas fa-lg fa-archive\" aria-hidden=\"true\"></i>"
  url = "/archives"
[[menu.main]]
  weight = 6
  identifier = "about"
  name = "About"
  pre = "<i class=\"sidebar-button-icon fas fa-lg fa-question\" aria-hidden=\"true\"></i>"
  url = "/#about"

[[menu.links]]
  weight = 1
  identifier = "github"
  name = "GitHub"
  pre = "<i class=\"sidebar-button-icon fab fa-lg fa-github\" aria-hidden=\"true\"></i>"
  url = "https://github.com/YueYvetteHao"

[[menu.misc]]
  weight = 1
  identifier = "rss"
  name = "RSS"
  pre = "<i class=\"sidebar-button-icon fas fa-lg fa-rss\" aria-hidden=\"true\"></i>"
  url = "/index.xml"

# -------------
# Customization
# -------------
[params]
  description = "Yue Hao's portfolio and blog"
  syntaxHighlighter = "highlight.js"
  clearReading = true
  hierarchicalCategories = true
  sidebarBehavior = 1

  # Put your cover image in static/images/ (a placeholder is included)
  coverImage = "images/cover.jpg"
  imageGallery = true
  thumbnailImage = true
  thumbnailImagePosition = "bottom"
  autoThumbnailImage = true

  [[params.sharingOptions]]
    name = "Twitter"
    icon = "fab fa-twitter"
    url = "https://twitter.com/intent/tweet?text=%s"

  [[params.sharingOptions]]
    name = "Linkedin"
    icon = "fab fa-linkedin"
    url = "https://www.linkedin.com/sharing/share-offsite/?url=%s"

  [params.header.rightLink]
    class = ""
    icon = ""
    url = "/#about"

  [params.footer]
    copyright = "<a href=\"https://github.com/YueYvetteHao\">Yue Hao</a>"
